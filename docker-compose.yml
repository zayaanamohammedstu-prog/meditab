version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: meditab
      POSTGRES_USER: meditab
      POSTGRES_PASSWORD: meditabpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
  web:
    build: .
    command: gunicorn meditab.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://meditab:meditabpass@db:5432/meditab
      - SECRET_KEY=your-secret-key-change-in-production
      - DEBUG=False
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/staticfiles
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
volumes:
  postgres_data:
  static_volume:
